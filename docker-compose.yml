services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=/api

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy # Wait for DB to be "Ready" before starting
    environment:
      - PORT=8080
      - API_KEY=${API_KEY}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=fieldops
      - DB_USER=fieldops
      - DB_PASSWORD=fieldops_pass
      - WA_VERIFY_TOKEN=${WA_VERIFY_TOKEN}
      - WA_PHONE_NUMBER_ID=${WA_PHONE_NUMBER_ID}
      - WA_ACCESS_TOKEN=${WA_ACCESS_TOKEN}

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=fieldops
      - POSTGRES_PASSWORD=fieldops_pass
      - POSTGRES_DB=fieldops
    volumes:
      - postgres_data:/var/lib/postgresql/data # This saves your data permanently
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fieldops -d fieldops"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: # Define the storage volume
